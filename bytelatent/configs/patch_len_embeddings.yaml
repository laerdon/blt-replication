# h100 blt run over roughly 1.7b training tokens with batch size 8,
# adding sinusoidal patch-length embeddings to patch representations.
config: bytelatent/configs/h100_fineweb_1p7b_bs8.yaml

dump_dir: ./runs/h100_fineweb_1p7b_bs8_patchlen_sin_v2
name: h100_fineweb_1p7b_bs8_patchlen_sin_v2

model:
  use_patch_length_sinusoidal_embedding: true
  encoder_enable_byte_ngrams: false
  encoder_ngram_to_size_str: null
  ngram_vocab_sizes: null

data:
  batch_size: 2